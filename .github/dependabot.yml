version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    groups:
      astro-stack:
        patterns:
          - "astro"
          - "@astrojs/*"
          - "typescript"
    commit-message:
      prefix: "deps"
